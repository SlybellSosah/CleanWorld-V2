<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clean World Inc.</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;

          function makeWritable(obj, prop) {
            try {
              var desc = Object.getOwnPropertyDescriptor(obj, prop);
              if (desc && !desc.configurable) {
                return false;
              }
              Object.defineProperty(obj, prop, {
                get: function() {
                  return currentFetch;
                },
                set: function(val) {
                  currentFetch = val;
                },
                configurable: true,
                enumerable: true
              });
              return true;
            } catch (e) {
              return false;
            }
          }

          makeWritable(Window.prototype, 'fetch');
          makeWritable(window, 'fetch');
          makeWritable(globalThis, 'fetch');
        } catch (e) {
          console.warn("Could not redefine fetch setter:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
